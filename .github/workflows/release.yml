name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

env:
  PLUGIN_NAME: reason
  DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Package plugin
        run: |
          mkdir "${PLUGIN_NAME}"
          cp main.js manifest.json styles.css "${PLUGIN_NAME}"
          zip -r "${PLUGIN_NAME}.zip" "${PLUGIN_NAME}"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            ${{ env.PLUGIN_NAME }}.zip
            main.js
            manifest.json
            styles.css

      - name: Load release metadata for Discord
        if: ${{ env.DISCORD_RELEASE_WEBHOOK_URL != '' }}
        id: release_metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" > release.json

          python3 <<'PY'
          import json
          import os

          with open("release.json", encoding="utf-8") as handle:
              release = json.load(handle)

          values = {
              "name": release.get("name") or release.get("tag_name") or "Release",
              "body": (release.get("body") or "Release notes were not provided for this release.").strip(),
              "html_url": release.get("html_url", ""),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in values.items():
                  marker = f"__{key.upper()}__"
                  print(f"{key}<<{marker}", file=output)
                  print(value, file=output)
                  print(marker, file=output)
          PY

      - name: Post release notes to Discord
        if: ${{ env.DISCORD_RELEASE_WEBHOOK_URL != '' }}
        uses: SethCohen/github-releases-to-discord@v1.20.0
        with:
          webhook_url: ${{ env.DISCORD_RELEASE_WEBHOOK_URL }}
          release_name: ${{ steps.release_metadata.outputs.name }}
          release_body: ${{ steps.release_metadata.outputs.body }}
          release_html_url: ${{ steps.release_metadata.outputs.html_url }}
          color: "8141549"
          username: "Enzyme releases"
          footer_title: "jshph/obsidian-enzyme"
          reduce_headings: true
          max_description: "3800"
